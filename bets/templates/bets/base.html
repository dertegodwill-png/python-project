<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Betting Tracker</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'bets/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container">
            <a href="{% url 'bets:matches' %}" class="logo">BetTracker</a>
            <nav>
                {% if user.is_authenticated %}
                    <a href="{% url 'bets:matches' %}">Matches</a>
                    <a href="{% url 'bets:dashboard' %}">Dashboard</a>
                    <a href="{% url 'bets:analytics' %}">Analytics</a>
                    <span class="user-greeting">Hi, {{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                    <a href="{% url 'register' %}" class="btn btn-primary">Register</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container content">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="alert alert-{{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        
        {% block content %}{% endblock %}
    </main>
    
    <script src="{% static 'bets/charts.js' %}"></script>
</body>
</html>
