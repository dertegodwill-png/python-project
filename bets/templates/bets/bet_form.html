{% extends "bets/base.html" %}

{% block content %}
<div class="form-container">
    <div class="glass-panel p-4">
        <h2>Add a New Bet</h2>
        <form method="POST" class="bet-form mt-3">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="form-actions mt-4">
                <a href="{% url 'bets:matches' %}" class="btn btn-outline">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Bet</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
